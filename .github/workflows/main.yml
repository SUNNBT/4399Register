name: Build 4399Register

# 触发条件：main分支推送、手动运行、新建tag
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  tags:
    - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests

      - name: PyInstaller打包
        run: |
          pyinstaller --onefile --noconsole --name "4399Register" --clean main.py

      - name: 上传产物到工作流
        uses: actions/upload-artifact@v4
        with:
          name: 4399Register-Windows
          path: dist/4399Register.exe

      # 新建tag时自动发布Release
      - name: 发布Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/4399Register.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
